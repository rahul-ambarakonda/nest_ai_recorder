# Copy to /config/nest_ai_recorder.yaml on Home Assistant OS

camera:
  name: front_door
  # go2rtc HTTP is more reliable than RTSP for Nest doorbell streams.
  rtsp_url: http://127.0.0.1:1984/api/stream.mp4?src=nest_doorbell
  video_codec: libx264
  analyze_duration_microseconds: 10000000
  probe_size: 10000000

buffer:
  directory: /media/nest-ai-recorder/buffer
  duration_seconds: 120
  segment_seconds: 10

clips:
  output_directory: /media/videos
  pre_buffer_seconds: 10
  post_buffer_seconds: 50

detection:
  enabled: true
  ignore_motion_without_object: false
  motion_min_score: 0.01
  cooldown_seconds: 30
  frame_interval_seconds: 1.0

mqtt:
  enabled: true
  host: 127.0.0.1
  port: 1883
  topic_prefix: nest_ai_recorder

dashboard:
  enabled: true
  host: 0.0.0.0
  port: 8099
  stats_path: /media/nest-ai-recorder/stats.json

logging:
  directory: /config/nest-ai-recorder/logs
  level: INFO
