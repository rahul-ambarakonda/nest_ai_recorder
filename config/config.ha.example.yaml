# Copy to /config/nest_ai_recorder.yaml on Home Assistant OS

camera:
  name: front_door
  # Use nest_doorbell first. Switch to nest_doorbell_record only after
  # that stream shows online in go2rtc with a working preview.
  rtsp_url: rtsp://127.0.0.1:8554/nest_doorbell
  video_codec: copy
  analyze_duration_microseconds: 50000000
  probe_size: 50000000

buffer:
  directory: /media/nest-ai-recorder/buffer
  duration_seconds: 120
  segment_seconds: 10
  segment_format: mp4

clips:
  output_directory: /media/videos
  pre_buffer_seconds: 10
  post_buffer_seconds: 50

detection:
  enabled: true
  frame_source: buffer
  ignore_motion_without_object: false
  motion_threshold: 15.0
  motion_min_score: 0.001
  cooldown_seconds: 30
  frame_interval_seconds: 2.0

mqtt:
  enabled: true
  host: 127.0.0.1
  port: 1883
  topic_prefix: nest_ai_recorder

dashboard:
  enabled: true
  host: 0.0.0.0
  port: 8099
  stats_path: /media/nest-ai-recorder/stats.json

logging:
  directory: /config/nest-ai-recorder/logs
  level: INFO
